<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="fundo-loop">
    <div class="fundo-track">
      <div class="fundo-item" style="background-image: url('jogo.jpg')"></div>
      <div class="fundo-item" style="background-image: url('anime.jpg')"></div>
      <div class="fundo-item" style="background-image: url('curiosidade.jpg')"></div>
      <div class="fundo-item" style="background-image: url('musica.jpg')"></div>

      <div class="fundo-item" style="background-image: url('jogo.jpg')"></div>
      <div class="fundo-item" style="background-image: url('anime.jpg')"></div>
      <div class="fundo-item" style="background-image: url('curiosidade.jpg')"></div>
      <div class="fundo-item" style="background-image: url('musica.jpg')"></div>
    </div>
  </div>

  <div class="overlay"></div>

  <div class="bg-animado">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <main class="hub">

    <div class="titulo-area">
      <h1>GAME HUB</h1>
      <p>Escolha um jogo para começar</p>
    </div>

    <section class="grade-jogos">

      <div class="card-jogo">
        <div class="imagem-card quiz"></div>

        <div class="conteudo-card">
          <h2>Quiz Interativo</h2>

          <p>
            Responda perguntas sobre jogos, animes,
            músicas e curiosidades.
          </p>

          <button class="btn-jogar" data-link="indexQuiz.html">
            Jogar
          </button>
        </div>
      </div>

      <div class="card-jogo">
        <div class="imagem-card velha"></div>

        <div class="conteudo-card">
          <h2>Jogo da Velha</h2>

          <p>
            Enfrente outro jogador no clássico
            jogo da velha.
          </p>

          <button class="btn-jogar" data-link="jogoVelha.html">
            <a href="jogoVelha.html" class="card-jogo card-jogo-da-velha">
            Jogar
          </button>
        </div>
      </div>

    </section>

  </main>

  <audio id="bg-music" loop preload="auto">
    <source src="back_song.opus" type='audio/ogg; codecs="opus"'>
    <source src="back_songa.m4a" type="audio/mp4">
    <source src="back_songm.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>

</body>
</html>
