<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Crawlers</title>

<link rel="stylesheet" href="styleDungeon.css">
</head>

<body>

<button id="btn-config" class="btn-engrenagem">⚙</button>

<div class="container">

    <h1>DUNGEON CRAWLERS</h1>

    <div class="status">

        <div>❤️ Vida: <span id="vida">100</span></div>

        <div>🔷 Mana: <span id="mana">50</span></div>

        <div>💰 Ouro: <span id="ouro">0</span></div>

        <div>⚔️ Arma: <span id="arma">Espada de Madeira</span></div>

        <div>🚪 Sala: <span id="sala">1</span>/10</div>

    </div>

    <div class="painel">

        <h2 id="tituloEvento">
            Entrada da Dungeon
        </h2>

        <p id="textoEvento">
            O rei enviou você para encontrar o tesouro escondido pelo Dragão Ancião.
        </p>

        <div id="acoes"></div>

    </div>

    <div class="botoes">

        <button id="reiniciarBtn">
            Reiniciar
        </button>

        <button onclick="window.location.href='index.html'">
            Voltar ao Hub
        </button>

    </div>

</div>

<div id="config-modal" class="modal">

    <div class="modal-conteudo">

        <h2>Configurações</h2>

        <label>
            <input type="checkbox" id="toggle-darkmode">
            Modo escuro
        </label>

        <label>
            <input type="checkbox" id="toggle-som" checked>
            Som ligado
        </label>

        <input type="range" id="volume-slider" min="0" max="100" value="25">

        <button id="fechar-config">
            Fechar
        </button>

    </div>

</div>

<audio id="bg-music" loop preload="auto">
<source src="back_song.opus">
<source src="back_songa.m4a">
<source src="back_songm.mp3">
</audio>

<script src="scriptDungeon.js"></script>

</body>
</html>
