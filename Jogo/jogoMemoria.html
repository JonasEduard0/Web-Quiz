<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória</title>
    <link rel="stylesheet" href="styleMemoria.css">
</head>
<body>
  <button id="btn-config" class="btn-engrenagem" title="Configurações">⚙</button>


    <div id="config-modal" class="modal">
    <div class="modal-conteudo">
      <h2>Configuracões</h2>

      <label class="config-item">
        <input type="checkbox" id="toggle-darkmode">
        Modo escuro
      </label>

      <label class="config-item">
        <input type="checkbox" id="toggle-som" checked>
        Som ligado
      </label>

      <div class="volume-box">
        <label for="volume-slider">Volume da música</label>
        <input type="range" id="volume-slider" min="0" max="100" value="25">
        <span id="volume-valor">25%</span>
      </div>

      <button id="fechar-config" class="btn-principal" type="button">Fechar</button>
    </div>
  </div>

  <main class="container">

    <div class="painel">

        <h1>Jogo da Memória</h1>

        <p id="tentativas">
            Tentativas: 0
        </p>

        <p id="pares">
            Pares: 0/8
        </p>

        <div id="tabuleiro" class="tabuleiro"></div>

        <div class="acoes">

            <button
                id="reiniciar-btn"
                class="btn-principal">

                Reiniciar

            </button>

            <button
                id="voltar-btn"
                class="btn-secundario">

                Voltar ao Hub

            </button>

        </div>

    </div>

</main>

  <audio id="bg-music" loop preload="auto">
    <source src="back_song.opus" type='audio/ogg; codecs="opus"'>
    <source src="back_songa.m4a" type="audio/mp4">
    <source src="back_songm.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

    <script src="scriptMemoria.js"></script>
</body>
</html>
